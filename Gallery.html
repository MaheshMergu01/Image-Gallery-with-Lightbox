<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>
    <link type="stylesheet" href="Gallery.css" />
  </head>
  <body>
    <h1>My Gallery</h1>

    <div class="gallery">
      <a href="#img1"><img src="img1.jpg"/></a>
      <a href="#img2"><img src="img2.jpg"/></a>
      <a href="#img3"><img src="img3.jpg"/></a>
      <a href="#img4"><img src="img4.jpg"/></a>
      <a href="#img5"><img src="img5.jpg"/></a>
      <a href="#img6"><img src="img6.jpg"/></a>
    </div>

    <!--Lightbox-->
    <div id="img1" class="lightbox">
      <a href="#"><img src="img1.jpg" alt=""/></a>
    </div>

    <div id="img2" class="lightbox">
      <a href="#"><img src="img2.jpg" alt=""/></a>
    </div>

    <div id="img3" class="lightbox">
      <a href="#"><img src="img3.jpg" alt=""/></a>
    </div>

    <div id="img4" class="lightbox">
      <a href="#"><img src="img4.jpg" alt=""/></a>
    </div>

    <div id="img5" class="lightbox">
      <a href="#"><img src="img5.jpg" alt=""/></a>
    </div>

    <div id="img6" class="lightbox">
      <a href="#"><img src="img6.jpg" alt=""/></a>
    </div>
  </body>
</html>
